<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zezo's profile | Backloggd</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <p class="logo">Backloggd</p>

                <div class="nav-right">
                    <ul class="nav-list">
                        <li class="nav-item"><a class="nav-link-notification" href="#">
                                <img src="assets/bell-alt-svgrepo-com.svg" alt="">
                            </a></li>
                        <li class="nav-item"><a class="nav-link-dropdown" href="#">
                                Zezos
                                <img src="assets/arrow-down-svgrepo-com.svg" alt="">
                            </a></li>
                        <li class="nav-item"><a class="nav-link-games" href="#">
                                Games
                            </a>
                        </li>
                    </ul>

                    <div class="search-container">
                        <input class="search-bar" type="search" placeholder="Search">
                        <button class="search-btn" type="submit">
                            <img src="assets/magnifying-glass-svgrepo-com.svg" alt="">
                        </button>
                    </div>
                    <button class="add-a-game-btn"> Log a Game</button>
                </div>
            </div>
        </nav>
    </header>

    <main role="main" class="main">
        <div class="main-container">
            <div class="profile-header col">
                <img src="images/profile-picture.jpg" alt="">

                <div class="profile-rows">
                    <div class="profile-top-row">
                        <h3 class="profile-name">Zezos</h3>
                    </div>
                    <div class="profile-middle-row">
                        <a class="profile-link letterboxd" href="#">
                            <img src="assets/letterboxd-svgrepo-com.svg" alt="">
                            Zeze_Keysos
                        </a>
                        <a class="profile-link steam" href="#">
                            <img src="assets/steam-svgrepo-com.svg" alt="">
                            Steam Profile</a>
                        <a class="profile-link twitter" href="#">
                            <img src="assets/Twitter-X--Streamline-Bootstrap.svg" alt="">
                            keysos_</a>
                    </div>
                    <div class="profile-bottom-row">
                        <button class="profile-edit-btn btn">Edit Profile</button>
                        <button class="profile-copy-btn btn">
                            <img src="assets/copy-svgrepo-com.svg" alt="">
                        </button>
                    </div>
                </div>
            </div>

            <div class="profile-nav">
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Profile
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Games
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Journal
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Activity
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Reviews
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Lists
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Friends
                    </a>
                </div>
                <div class="profile-nav-container">
                    <a class="profile-nav-links" href="#">
                        Likes
                    </a>
                </div>
            </div>

            <div class="main-content">
                <div class="profile-sidebar">
                    <div class="sidebar-bio">
                        <span class="bio-title">Bio</span>
                        <hr class="bio-hr">
                        <span class="bio-text">I like detective games, comics, indie titles, retro games, and RPGS mostly.</span>
                    </div>
                </div>

                <div class="profile-games">
                   <p>No games to display.</p>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
